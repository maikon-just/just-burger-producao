async function runSeed(){
  const btn=document.getElementById('btn-seed');
  const btnC=document.getElementById('btn-clear');
  btn.disabled=true;btnC.disabled=true;
  btn.textContent='⏳ Cadastrando...';
  log('🚀 Iniciando seed com '+TODAS.length+' tarefas...');
  log('────────────────────────');
  let ok=0,err=0;
  for(let i=0;i<TODAS.length;i++){
    const t=TODAS[i];
    try{
      const ref=db.ref('tarefas').push();
      await ref.set({...t,ativo:true,created_at:Date.now(),updated_at:Date.now()});
      ok++;
      if(ok%10===0||ok===TODAS.length) log('✅ '+ok+'/'+TODAS.length+' — '+t.colaborador+' | '+t.dia_semana+' | '+t.item);
    }catch(e){err++;log('❌ ERRO: '+t.item+' — '+e.message);}
    setProgress(i+1,TODAS.length);
    if((i+1)%20===0) await new Promise(r=>setTimeout(r,300));
  }
  log('────────────────────────');
  log('🎉 CONCLUÍDO! '+ok+' tarefas cadastradas.'+(err>0?' '+err+' erros.':' Sem erros!'));
  log('✅ Volte ao app: https://maikon-just.github.io/just-burger-producao/');
  btn.textContent='✅ Seed Concluído!';
  btn.style.background='#22c55e';
  btnC.disabled=false;
}
async function clearTarefas(){
  if(!confirm('⚠️ Isso vai APAGAR TODAS as tarefas do Firebase.\n\nTem certeza?')) return;
  const btn=document.getElementById('btn-clear');
  const btnS=document.getElementById('btn-seed');
  btn.disabled=true;btnS.disabled=true;
  btn.textContent='⏳ Limpando...';
  log('🗑️ Limpando todas as tarefas...');
  try{
    await db.ref('tarefas').remove();
    log('✅ Todas as tarefas removidas!');
    log('Agora clique em "Iniciar Seed" para recadastrar.');
    document.getElementById('prog-fill').style.width='0%';
    document.getElementById('count-txt').textContent='Banco limpo. Pronto para novo seed.';
  }catch(e){log('❌ Erro: '+e.message);}
  btn.disabled=false;btnS.disabled=false;
  btn.textContent='🗑️ Limpar Tarefas';
}
