<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Just Burger — Insumos por Colaborador</title>
  <!-- Firebase SDK v9 compat -->
  <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <style>
    :root{
      --bg:#f4f6fa;--card:#ffffff;--border:#dde1ed;
      --yellow:#e6a800;--green:#16a34a;--orange:#ea580c;
      --red:#dc2626;--blue:#2563eb;--text:#1a1d2e;--muted:#6b7280;
      --r:14px;--sh:0 2px 12px rgba(0,0,0,0.07);
      --brand:#e8590c;--brand2:#ff7b2f;
      --dark:#1a1a2e;--dark2:#16213e;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* ── TOP BAR ── */
    .top-bar{
      background:linear-gradient(135deg,var(--dark),var(--dark2));
      border-bottom:3px solid var(--brand);
      padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.25);
    }
    .back-btn{
      width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.2);color:#fff;text-decoration:none;
      font-size:15px;display:flex;align-items:center;justify-content:center;
      transition:.2s;flex-shrink:0;cursor:pointer;
    }
    .back-btn:hover{background:rgba(255,255,255,.22)}
    .tb-brand{flex:1}
    .tb-brand .logo{font-size:16px;font-weight:900;color:#fff}
    .tb-brand .sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px}
    .tb-links{display:flex;gap:6px}
    .tb-link{
      font-size:12px;font-weight:700;color:rgba(255,255,255,.8);text-decoration:none;
      padding:6px 11px;border-radius:8px;background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.15);transition:.2s;cursor:pointer;
      display:flex;align-items:center;gap:5px;
    }
    .tb-link:hover{background:rgba(255,255,255,.22);color:#fff}

    /* ── FILTER BAR ── */
    .filter-bar{
      background:#fff;border-bottom:1px solid var(--border);
      padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
      position:sticky;top:62px;z-index:90;box-shadow:0 2px 8px rgba(0,0,0,.05);
    }
    .filter-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
    .tgl{
      padding:6px 12px;border:1.5px solid var(--border);background:#fff;
      color:var(--muted);border-radius:8px;cursor:pointer;font-size:12px;
      font-weight:700;font-family:inherit;transition:all .15s;
    }
    .tgl.active{background:var(--brand);border-color:var(--brand);color:#fff}
    .tgl.dia.active{background:#f97316;border-color:#f97316}
    .tgl.noite.active{background:#4f46e5;border-color:#4f46e5}
    .cat-sel{
      background:#fff;border:1.5px solid var(--border);color:var(--text);
      padding:6px 10px;border-radius:8px;font-size:13px;font-family:inherit;
      outline:none;cursor:pointer;
    }
    .cat-sel:focus{border-color:var(--brand)}
    .btn-refresh{
      background:var(--brand);color:#fff;border:none;padding:7px 14px;
      border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;
      font-family:inherit;display:flex;align-items:center;gap:5px;
    }
    .btn-refresh:hover{background:#c0470a}
    .btn-print-all{
      background:#1d4ed8;color:#fff;border:none;padding:7px 14px;
      border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;
      font-family:inherit;display:flex;align-items:center;gap:5px;margin-left:auto;
    }
    .btn-print-all:hover{background:#1e40af}

    /* ── MAIN ── */
    .main{max-width:980px;margin:0 auto;padding:16px 16px 80px}

    /* ── RESUMO CHIPS ── */
    .sum-bar{
      display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;
    }
    .sum-chip{
      background:#fff;border-radius:10px;border:1px solid var(--border);
      padding:10px 16px;display:flex;flex-direction:column;align-items:center;
      gap:2px;min-width:90px;box-shadow:var(--sh);flex:1;
    }
    .sum-chip .val{font-size:22px;font-weight:900}
    .sum-chip .lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    .sum-chip.blue .val{color:#1d4ed8}
    .sum-chip.green .val{color:#16a34a}
    .sum-chip.orange .val{color:#ea580c}
    .sum-chip.purple .val{color:#7c3aed}

    /* ── COLLAB BLOCK ── */
    .collab-block{
      background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      margin-bottom:14px;overflow:hidden;box-shadow:var(--sh);
    }
    .collab-hdr{
      padding:12px 16px;display:flex;align-items:center;gap:10px;
      cursor:pointer;transition:background .15s;
      border-bottom:1px solid transparent;
    }
    .collab-hdr:hover{background:#fafbff}
    .collab-hdr.open{border-bottom-color:var(--border);background:#f9fafb}
    .collab-emoji{font-size:22px;flex-shrink:0}
    .collab-info{flex:1}
    .collab-name{font-size:14px;font-weight:900;color:var(--text)}
    .collab-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .collab-chevron{font-size:12px;color:var(--muted);transition:transform .25s}
    .collab-chevron.open{transform:rotate(180deg)}
    .collab-body{display:none;padding:0}
    .collab-body.open{display:block}
    .btn-print-colab{
      background:none;border:1.5px solid #1d4ed8;color:#1d4ed8;
      padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;
      cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;
      transition:all .15s;white-space:nowrap;
    }
    .btn-print-colab:hover{background:#1d4ed8;color:#fff}

    /* ── TABELA DE INSUMOS POR COLABORADOR ── */
    .ins-table{width:100%;border-collapse:collapse}
    .ins-table thead th{
      background:#f8f9fc;padding:8px 12px;font-size:11px;font-weight:700;
      color:var(--muted);text-transform:uppercase;letter-spacing:.4px;
      text-align:left;border-bottom:1px solid var(--border);
    }
    .ins-table tbody tr:hover{background:#fafbff}
    .ins-table td{padding:9px 12px;border-bottom:1px solid #eef0f6;vertical-align:middle;font-size:13px}
    .ins-table tr:last-child td{border-bottom:none}
    .item-name{font-weight:700;color:var(--text)}
    .item-cat{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px}
    .qty-val{font-weight:900;font-size:15px;color:var(--brand)}
    .qty-unit{font-size:11px;color:var(--muted);margin-left:2px}
    .check-col{text-align:center;width:60px}
    .check-box{
      width:24px;height:24px;border:2px solid var(--border);border-radius:6px;
      background:#fff;cursor:pointer;display:inline-flex;align-items:center;
      justify-content:center;font-size:14px;transition:all .15s;
    }
    .check-box:hover{border-color:var(--green);background:#f0fdf4}
    .check-box.checked{background:#16a34a;border-color:#16a34a;color:#fff}

    /* ── ESTADOS ── */
    .state-box{text-align:center;padding:48px 20px;color:var(--muted)}
    .state-box i{font-size:36px;margin-bottom:12px;display:block;opacity:.4}
    .state-box.loading i{animation:spin 1s linear infinite;opacity:.6}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── TOAST ── */
    #toast-ins{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
      background:#1e293b;color:#fff;padding:10px 22px;border-radius:30px;
      font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;
      pointer-events:none;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.2);
    }
    #toast-ins.show{transform:translateX(-50%) translateY(0)}

    /* ── BADGE COLAB ── */
    .dept-badge{
      display:inline-block;padding:2px 8px;border-radius:12px;
      font-size:10px;font-weight:800;margin-left:6px;
    }
    .badge-prod{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa}
    .badge-op{background:#f0fdf4;color:#16a34a;border:1px solid #86efac}
    .badge-at{background:#eff6ff;color:#1d4ed8;border:1px solid #93c5fd}

    /* ── PRINT ── */
    @media print{
      .top-bar,.filter-bar,.btn-print-all,.btn-print-colab,#toast-ins{display:none!important}
      .collab-block{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
      .collab-body{display:block!important}
      body{background:#fff}
    }
  </style>
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div class="top-bar">
  <a href="index.html" class="back-btn" title="Voltar ao App"><i class="fas fa-arrow-left"></i></a>
  <div class="tb-brand">
    <div class="logo">🍔 Just Burger — Insumos</div>
    <div class="sub">Lista de retirada por colaborador · Turno e Dia</div>
  </div>
  <div class="tb-links">
    <a href="medias.html" class="tb-link"><i class="fas fa-photo-video"></i> Mídias</a>
    <a href="dashboard.html" class="tb-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="resultados_v2.html" class="tb-link"><i class="fas fa-chart-bar"></i> Resultados</a>
  </div>
</div>

<!-- ══ FILTER BAR ══ -->
<div class="filter-bar">
  <span class="filter-label">Turno</span>
  <button class="tgl dia active" id="tgl-dia"   onclick="setTurno('dia')">☀️ Dia</button>
  <button class="tgl noite"      id="tgl-noite"  onclick="setTurno('noite')">🌙 Noite</button>
  <span class="filter-label" style="margin-left:6px">Dia</span>
  <select class="cat-sel" id="sel-dia" onchange="carregar()">
    <option value="segunda">Segunda</option>
    <option value="terca">Terça</option>
    <option value="quarta">Quarta</option>
    <option value="quinta">Quinta</option>
    <option value="sexta">Sexta</option>
    <option value="sabado">Sábado</option>
    <option value="domingo">Domingo</option>
  </select>
  <button class="btn-refresh" onclick="carregar()"><i class="fas fa-sync-alt"></i> Atualizar</button>
  <button class="btn-print-all" onclick="imprimirTodos()"><i class="fas fa-print"></i> Imprimir Todos</button>
</div>

<!-- ══ MAIN ══ -->
<div class="main">
  <div class="sum-bar" id="sum-bar" style="display:none">
    <div class="sum-chip blue"><span class="val" id="sum-colab">0</span><span class="lbl">Colaboradores</span></div>
    <div class="sum-chip green"><span class="val" id="sum-itens">0</span><span class="lbl">Itens</span></div>
    <div class="sum-chip orange"><span class="val" id="sum-uniq">0</span><span class="lbl">Insumos Únicos</span></div>
    <div class="sum-chip purple"><span class="val" id="sum-cat">0</span><span class="lbl">Categorias</span></div>
  </div>
  <div id="lista-content">
    <div class="state-box loading"><i class="fas fa-spinner"></i><p>Carregando tarefas...</p></div>
  </div>
</div>

<div id="toast-ins"></div>

<script>
/* ══════════════════════════════════════════
   JUST BURGER — Insumos por Colaborador
   Lista de retirada de estoque filtrada por turno + dia da semana
   Integração com Firebase Realtime Database
══════════════════════════════════════════ */

/* ── Firebase init ── */
(function(){
  const cfg={
    apiKey:"AIzaSyDt1yzxGGzuT2cSdten1bFuXG7yeDQ90Po",
    authDomain:"justburger-producao-e9b27.firebaseapp.com",
    databaseURL:"https://justburger-producao-e9b27-default-rtdb.firebaseio.com",
    projectId:"justburger-producao-e9b27",
    storageBucket:"justburger-producao-e9b27.firebasestorage.app",
    messagingSenderId:"387070713910",
    appId:"1:387070713910:web:f156d3247a1715a58ab897"
  };
  if(!firebase.apps.length) firebase.initializeApp(cfg);
  window._fbIns = firebase.database();
})();

const DIAS_LIST_INS = [
  {key:'segunda',label:'Segunda-feira',short:'SEG'},
  {key:'terca',  label:'Terça-feira',  short:'TER'},
  {key:'quarta', label:'Quarta-feira', short:'QUA'},
  {key:'quinta', label:'Quinta-feira', short:'QUI'},
  {key:'sexta',  label:'Sexta-feira',  short:'SEX'},
  {key:'sabado', label:'Sábado',       short:'SAB'},
  {key:'domingo',label:'Domingo',      short:'DOM'},
];

const COLLAB_EMOJI_INS = {
  'DINA':'👩‍💼','SANDRO':'👨‍💼','PABLO':'🍗','MATEUS':'🥫','JOÃO':'🔪',
  'ALAN RICARDO':'🔥','GABRIEL KHALYL':'🥩','GABRIEL LEITE':'🧊','LOHAINE':'🍟',
  'RHUAN':'🍟','ATENDIMENTO / DESPACHO':'📦','FABIO':'🧀','DAVI':'🍅',
  'HENRIQUE':'🥬','JOSÉ BRUNO':'🥓','PEDRO':'🥤','SAMUEL':'🧊','LUCAS':'🍳',
  'FERNANDO':'🍖','RODRIGO':'🧀','JHON':'🌶️','NOITE - CHAPEIRO':'🔥',
  'NOITE - FRITADEIRA':'🍟','NOITE - MONTADOR':'🧊','ANTONIEL':'🎯',
  'MARCUS':'📋','ALINE':'🎀','DESPACHO':'📦',
};

const COLLAB_DEPT_INS = {
  'ANTONIEL':'ATENDIMENTO','MARCUS':'ATENDIMENTO','ALINE':'ATENDIMENTO','DESPACHO':'ATENDIMENTO',
  'ALAN RICARDO':'OPERACAO','SAMUEL':'OPERACAO','LOHAINE':'OPERACAO','GABRIEL LEITE':'OPERACAO','RHUAN':'OPERACAO',
  'NOITE - CHAPEIRO':'OPERACAO','NOITE - MONTADOR':'OPERACAO','NOITE - FRITADEIRA':'OPERACAO',
  'GABRIEL KHALYL':'PRODUCAO','JOÃO':'PRODUCAO','PABLO':'PRODUCAO','MATEUS':'PRODUCAO',
  'DINA':'PRODUCAO','SANDRO':'PRODUCAO',
};

const CAT_EMOJI_INS = {
  'pré-preparo':'🔪','producao':'🏭','produção':'🏭','sachês':'📦','saladas':'🥗',
  'fritadeira':'🍟','hamburger':'🍔','logística':'🚚','câmaras':'❄️',
  'ilha quente / chapeiro':'🔥','ilha fria / montador':'🧊','abertura':'🔑',
  'supervisão':'👁️','limpeza':'🧹','molhos':'🫙','pães':'🍞','carnes':'🥩',
  'maionese':'🧴','preparo':'👨‍🍳','geral':'📋','atendimento':'🎯','operação':'⚙️',
};

function _catEmoji(cat){ return CAT_EMOJI_INS[(cat||'').toLowerCase().trim()]||'📦'; }
function _deptBadge(nome){
  const d=(COLLAB_DEPT_INS[nome?.toUpperCase?.()]||'').toLowerCase();
  if(d==='producao') return '<span class="dept-badge badge-prod">Produção</span>';
  if(d==='operacao') return '<span class="dept-badge badge-op">Operação</span>';
  if(d==='atendimento') return '<span class="dept-badge badge-at">Atendimento</span>';
  return '';
}
function _fmt(n){ const v=parseFloat(n)||0; return v===Math.round(v)?String(v):v.toFixed(1); }

/* ── Estado ── */
let _turnoAtual = 'dia';
let _dados = []; // tarefas carregadas

/* ── Init ── */
window.addEventListener('DOMContentLoaded', () => {
  // Detecta dia da semana atual
  const DIA_MAP = ['domingo','segunda','terca','quarta','quinta','sexta','sabado'];
  const hoje = new Date();
  const diaHoje = DIA_MAP[hoje.getDay()];
  const sel = document.getElementById('sel-dia');
  if(sel) sel.value = diaHoje;
  carregar();
});

/* ── Turno ── */
function setTurno(t){
  _turnoAtual = t;
  document.getElementById('tgl-dia').classList.toggle('active', t==='dia');
  document.getElementById('tgl-noite').classList.toggle('active', t==='noite');
  carregar();
}

/* ── Carregar tarefas ── */
async function carregar(){
  const cont = document.getElementById('lista-content');
  cont.innerHTML = `<div class="state-box loading"><i class="fas fa-spinner"></i><p>Buscando tarefas...</p></div>`;
  document.getElementById('sum-bar').style.display='none';

  const dia   = document.getElementById('sel-dia').value;
  const turno = _turnoAtual;

  try {
    /* Carrega via Firebase Realtime DB */
    const snap = await window._fbIns.ref('tarefas').once('value');
    const val  = snap.val();
    const rows = val ? Object.entries(val).map(([id,obj])=>({id,...obj})) : [];

    // Filtra por turno e dia, excluindo checklists (sem quantidade ou unidade especial)
    const UNID_CHECKLIST = ['checklist','vídeo','video','execução','execucao','tarefa','atividade',
      'limpeza','higienização','higienizacao','conferir','verificar','organizar','abastecer',
      's/qtd','sem qtd','sem quantidade','turno','vez','dia','sessao','sessão','serviço','servico'];
    const UNID_FISICAS = ['kg','g','l','ml','un','unidade','pote','sache','saches','sachê','sachês','cx','caixa','pct','band'];

    const filtradas = rows.filter(t => {
      if(t.turno !== turno) return false;
      if(t.dia_semana !== dia) return false;
      // Inclui apenas tarefas com quantidade física (insumo real)
      const u = (t.unidade||'').toLowerCase().trim();
      if(UNID_CHECKLIST.includes(u)) return false;
      if(!u && (!t.quantidade_padrao || Number(t.quantidade_padrao)===0)) return false;
      return true;
    });

    _dados = filtradas;

    if(!filtradas.length){
      cont.innerHTML = `<div class="state-box"><i class="fas fa-inbox"></i><p>Nenhum insumo para <strong>${turno==='dia'?'☀️ Dia':'🌙 Noite'}</strong> · <strong>${DIAS_LIST_INS.find(d=>d.key===dia)?.label||dia}</strong></p></div>`;
      return;
    }

    // Agrupa por colaborador
    const porColab = {};
    filtradas.forEach(t => {
      const c = t.colaborador||'?';
      if(!porColab[c]) porColab[c]=[];
      porColab[c].push(t);
    });

    // Atualiza resumo
    const todosItens = new Set(filtradas.map(t=>t.item));
    const todasCats  = new Set(filtradas.map(t=>t.categoria).filter(Boolean));
    document.getElementById('sum-colab').textContent = Object.keys(porColab).length;
    document.getElementById('sum-itens').textContent = filtradas.length;
    document.getElementById('sum-uniq').textContent  = todosItens.size;
    document.getElementById('sum-cat').textContent   = todasCats.size;
    document.getElementById('sum-bar').style.display = '';

    // Renderiza
    const dObj = DIAS_LIST_INS.find(d=>d.key===dia);
    cont.innerHTML = Object.keys(porColab).sort().map(nome => _renderColab(nome, porColab[nome], dObj, turno)).join('');

  } catch(e) {
    cont.innerHTML = `<div class="state-box"><i class="fas fa-exclamation-triangle" style="color:#dc2626;opacity:1"></i><p>Erro ao carregar: ${e.message}</p></div>`;
  }
}

function _renderColab(nome, tarefas, dObj, turno){
  const emoji = COLLAB_EMOJI_INS[nome]||'👤';
  const badge = _deptBadge(nome);
  const slug  = nome.replace(/[^a-z0-9]/gi,'_').toLowerCase();

  // Agrupa tarefas por categoria
  const porCat = {};
  tarefas.forEach(t => {
    const c = t.categoria||'Geral';
    if(!porCat[c]) porCat[c]=[];
    porCat[c].push(t);
  });

  const linhasCat = Object.keys(porCat).sort().map(cat => {
    const itens = porCat[cat];
    const rows  = itens.map(t => {
      const qtd  = _fmt(t.quantidade_padrao||0);
      const unid = t.unidade||'un';
      return `<tr>
        <td><div class="item-name">${t.item||'—'}</div><div class="item-cat">${cat}</div></td>
        <td class="qty-val"><span>${qtd}</span><span class="qty-unit">${unid}</span></td>
        <td class="check-col"><div class="check-box" onclick="toggleCheck(this)" title="Marcar conferido">⬜</div></td>
        <td style="width:80px;text-align:center;font-size:12px;color:var(--muted)">________</td>
      </tr>`;
    }).join('');
    return `
      <tr style="background:#f8f9fc">
        <td colspan="4" style="padding:6px 12px;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">
          ${_catEmoji(cat)} ${cat}
        </td>
      </tr>
      ${rows}`;
  }).join('');

  return `
  <div class="collab-block" id="cb-${slug}">
    <div class="collab-hdr open" onclick="toggleColab('${slug}')">
      <div class="collab-emoji">${emoji}</div>
      <div class="collab-info">
        <div class="collab-name">${nome}${badge}</div>
        <div class="collab-meta">${tarefas.length} item${tarefas.length!==1?'s':''} · ${turno==='dia'?'☀️ Dia':'🌙 Noite'} · ${dObj?.short||''}</div>
      </div>
      <button class="btn-print-colab" onclick="event.stopPropagation();imprimirColab('${slug}','${nome.replace(/'/g,"\\'")}')">
        <i class="fas fa-print"></i> Imprimir
      </button>
      <i class="fas fa-chevron-up collab-chevron open" id="chev-${slug}"></i>
    </div>
    <div class="collab-body open" id="body-${slug}">
      <table class="ins-table">
        <thead><tr>
          <th>Item</th>
          <th style="min-width:90px">Qtd Padrão</th>
          <th class="check-col">✓ Conf.</th>
          <th style="min-width:80px;text-align:center">Qtd Retirada</th>
        </tr></thead>
        <tbody id="tbody-${slug}">${linhasCat}</tbody>
      </table>
    </div>
  </div>`;
}

function toggleColab(slug){
  const body = document.getElementById('body-'+slug);
  const hdr  = body?.previousElementSibling;
  const chev = document.getElementById('chev-'+slug);
  if(!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if(hdr) hdr.classList.toggle('open', !isOpen);
  if(chev){ chev.classList.toggle('open', !isOpen); chev.className='fas fa-chevron-'+(isOpen?'down':'up')+' collab-chevron'+(isOpen?'':' open'); }
}

function toggleCheck(el){
  const isChecked = el.classList.toggle('checked');
  el.textContent = isChecked ? '✅' : '⬜';
  el.title = isChecked ? 'Conferido' : 'Marcar conferido';
}

/* ── Imprimir colaborador específico ── */
function imprimirColab(slug, nome){
  const dia    = document.getElementById('sel-dia').value;
  const turno  = _turnoAtual;
  const dObj   = DIAS_LIST_INS.find(d=>d.key===dia);
  const hoje   = new Date().toISOString().slice(0,10);

  const tarefas = _dados.filter(t=>t.colaborador===nome);
  if(!tarefas.length){ _toast('Nenhum item para '+nome); return; }

  const porCat = {};
  tarefas.forEach(t=>{ const c=t.categoria||'Geral'; if(!porCat[c]) porCat[c]=[]; porCat[c].push(t); });

  const linhas = Object.keys(porCat).sort().map(cat=>{
    const header = `<tr style="background:#f0f0f0"><td colspan="4" style="padding:5px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#555">${cat}</td></tr>`;
    const rows = porCat[cat].map(t=>`<tr>
      <td style="padding:6px 8px;font-weight:700">${t.item||'—'}</td>
      <td style="padding:6px 8px;text-align:center;font-weight:900;font-size:14px;color:#e8590c">${_fmt(t.quantidade_padrao||0)} <span style="font-size:10px;color:#555">${t.unidade||''}</span></td>
      <td style="padding:6px 8px;text-align:center;width:80px">__________</td>
      <td style="padding:6px 8px;text-align:center;width:50px">⬜</td>
    </tr>`).join('');
    return header+rows;
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>Insumos — ${nome}</title>
    <style>
      body{font-family:Arial,sans-serif;font-size:12px;padding:18px;color:#1a1a2e}
      h1{font-size:17px;font-weight:900;margin:0 0 4px}
      .info{font-size:11px;color:#555;margin:0 0 14px}
      table{width:100%;border-collapse:collapse}
      th,td{border:1px solid #ccc;text-align:left;vertical-align:middle}
      th{background:#f0f0f0;font-size:10px;font-weight:800;text-transform:uppercase;padding:6px 8px;letter-spacing:.4px}
      tr:nth-child(even){background:#f9f9f9}
      .footer{margin-top:20px;padding-top:10px;border-top:1px solid #ccc;font-size:10px;color:#888;display:flex;justify-content:space-between}
    </style>
    </head><body onload="window.print();setTimeout(function(){window.close()},600)">
    <h1>📦 ${nome} — Lista de Insumos</h1>
    <p class="info">Turno: ${turno==='dia'?'☀️ Dia':'🌙 Noite'} · ${dObj?.label||dia} · ${hoje}</p>
    <table>
      <thead><tr><th>Item</th><th style="width:110px;text-align:center">Qtd Padrão</th><th style="width:90px;text-align:center">Qtd Retirada</th><th style="width:50px;text-align:center">✓</th></tr></thead>
      <tbody>${linhas}</tbody>
    </table>
    <div class="footer"><span>Just Burger — Controle de Produção</span><span>Assinatura: ____________________</span></div>
    </body></html>`;
  const w = window.open('','_blank','width=800,height=700');
  if(w){ w.document.write(html); w.document.close(); }
}

/* ── Imprimir todos ── */
function imprimirTodos(){
  const dia   = document.getElementById('sel-dia').value;
  const turno = _turnoAtual;
  const dObj  = DIAS_LIST_INS.find(d=>d.key===dia);
  const hoje  = new Date().toISOString().slice(0,10);

  if(!_dados.length){ _toast('Sem dados para imprimir'); return; }

  const porColab = {};
  _dados.forEach(t=>{ const c=t.colaborador||'?'; if(!porColab[c]) porColab[c]=[]; porColab[c].push(t); });

  const blocos = Object.keys(porColab).sort().map(nome=>{
    const tarefas = porColab[nome];
    const porCat = {};
    tarefas.forEach(t=>{ const c=t.categoria||'Geral'; if(!porCat[c]) porCat[c]=[]; porCat[c].push(t); });
    const linhas = Object.keys(porCat).sort().map(cat=>{
      const header = `<tr style="background:#f0f0f0"><td colspan="4" style="padding:4px 8px;font-size:9px;font-weight:800;text-transform:uppercase;color:#555">${cat}</td></tr>`;
      const rows = porCat[cat].map(t=>`<tr><td style="padding:5px 8px;font-weight:700">${t.item||'—'}</td>
        <td style="text-align:center;font-weight:900;color:#e8590c">${_fmt(t.quantidade_padrao||0)} <small>${t.unidade||''}</small></td>
        <td style="text-align:center;width:80px">__________</td>
        <td style="text-align:center;width:40px">⬜</td></tr>`).join('');
      return header+rows;
    }).join('');
    return `<div style="page-break-inside:avoid;margin-bottom:20px;border:1px solid #ddd;border-radius:8px;overflow:hidden">
      <div style="background:#1a1a2e;color:#fff;padding:8px 12px;font-size:13px;font-weight:900">${COLLAB_EMOJI_INS[nome]||'👤'} ${nome}</div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr><th style="background:#f5f5f5;padding:5px 8px;font-size:9px;font-weight:800;text-transform:uppercase;border:1px solid #ccc">Item</th>
          <th style="background:#f5f5f5;padding:5px 8px;font-size:9px;font-weight:800;text-transform:uppercase;border:1px solid #ccc;text-align:center">Padrão</th>
          <th style="background:#f5f5f5;padding:5px 8px;font-size:9px;font-weight:800;text-transform:uppercase;border:1px solid #ccc;text-align:center">Retirado</th>
          <th style="background:#f5f5f5;padding:5px 8px;font-size:9px;font-weight:800;text-transform:uppercase;border:1px solid #ccc;text-align:center">✓</th></tr></thead>
        <tbody>${linhas}</tbody>
      </table>
    </div>`;
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Insumos ${turno==='dia'?'Dia':'Noite'} — ${dObj?.label||dia}</title>
    <style>body{font-family:Arial,sans-serif;font-size:11px;padding:16px;color:#1a1a2e}
    h1{font-size:16px;font-weight:900;margin:0 0 4px}.info{font-size:10px;color:#555;margin:0 0 14px}
    table{width:100%;border-collapse:collapse}td,th{border:1px solid #ccc;vertical-align:middle}
    </style>
    </head><body onload="window.print();setTimeout(function(){window.close()},600)">
    <h1>📦 Insumos — ${turno==='dia'?'☀️ Turno Dia':'🌙 Turno Noite'} · ${dObj?.label||dia}</h1>
    <p class="info">Data de impressão: ${hoje} · Total de colaboradores: ${Object.keys(porColab).length}</p>
    ${blocos}
    </body></html>`;
  const w = window.open('','_blank','width=900,height=700');
  if(w){ w.document.write(html); w.document.close(); }
}

/* ── Toast ── */
function _toast(msg, dur=3000){
  const el = document.getElementById('toast-ins');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}
