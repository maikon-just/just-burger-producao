<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Just Burger — Portal</title>

  <!-- Firebase -->
  <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.min.js"></script>
  <!-- Fontes e ícones -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <!-- Versão / cache-bust -->
  <script src="js/versao.js?v=20260330"></script>
  <!-- Firebase helper -->
  <script src="js/firebase_v2.js?v=20260330"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:  #e8590c;
      --brand2: #ff7b2f;
      --dark:   #0f0f1a;
      --dark2:  #1a1a2e;
      --dark3:  #16213e;
      --gold:   #EAB308;
      --gold2:  #FDE68A;
      --glass:  rgba(255,255,255,.06);
      --glass-b: rgba(255,255,255,.11);
    }

    html, body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: var(--dark);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ══ FUNDO ANIMADO ══ */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .bg-canvas::before {
      content: '';
      position: absolute; top: -25%; left: -15%;
      width: 65vw; height: 65vw;
      background: radial-gradient(circle, rgba(232,89,12,.14) 0%, transparent 70%);
      animation: bgFloat1 9s ease-in-out infinite;
    }
    .bg-canvas::after {
      content: '';
      position: absolute; bottom: -15%; right: -10%;
      width: 55vw; height: 55vw;
      background: radial-gradient(circle, rgba(234,179,8,.10) 0%, transparent 70%);
      animation: bgFloat2 11s ease-in-out infinite;
    }
    .bg-dots {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    @keyframes bgFloat1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(5vw,7vh) scale(1.05)} }
    @keyframes bgFloat2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-4vw,-5vh) scale(1.04)} }

    /* ══ SCROLL PRINCIPAL ══ */
    .portal-scroll {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 0 16px 60px;
      overflow-y: auto;
    }

    /* ══════════════════════════
       TELA DE LOGIN
    ══════════════════════════ */
    #screen-login {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 48px;
      animation: fadeUp .45s ease both;
    }
    #screen-login.hidden,
    #screen-first-access.hidden,
    #screen-hub.hidden { display: none !important; }

    /* Logo grande */
    .logo-block {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 36px;
    }
    .logo-img {
      height: 130px; width: auto; object-fit: contain;
      filter: drop-shadow(0 6px 28px rgba(232,89,12,.45));
      transition: filter .3s;
    }
    .logo-img:hover { filter: drop-shadow(0 8px 36px rgba(232,89,12,.65)); }
    .logo-fallback {
      display: none; flex-direction: column; align-items: center; gap: 6px;
    }
    .logo-fallback .lf-emoji  { font-size: 72px; }
    .logo-fallback .lf-name   {
      font-size: 30px; font-weight: 900; letter-spacing: 3px;
      background: linear-gradient(135deg, var(--brand), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-fallback .lf-sub    {
      font-size: 12px; font-weight: 700; letter-spacing: 6px;
      color: rgba(255,255,255,.4); text-transform: uppercase;
    }
    .logo-tagline {
      margin-top: 10px;
      font-size: 13px; font-weight: 700; letter-spacing: 1px;
      color: rgba(255,255,255,.35); text-transform: uppercase;
    }

    /* Card do login */
    .login-card {
      width: 100%;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-b);
      border-radius: 28px;
      padding: 34px 28px 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.07);
    }
    .login-card h2 {
      font-size: 21px; font-weight: 900; text-align: center; color: #fff;
      margin-bottom: 6px;
    }
    .login-card p {
      font-size: 13px; color: rgba(255,255,255,.42);
      text-align: center; margin-bottom: 26px; line-height: 1.5;
    }

    /* Campos */
    .inp-wrap {
      position: relative; margin-bottom: 13px;
    }
    .inp-wrap .iw-icon {
      position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.3); font-size: 15px; pointer-events: none;
    }
    .inp-wrap input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 14px; color: #fff;
      font-family: inherit; font-size: 15px; font-weight: 600;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .inp-wrap input::placeholder { color: rgba(255,255,255,.27); font-weight: 400; }
    .inp-wrap input:focus {
      border-color: var(--brand);
      background: rgba(255,255,255,.11);
      box-shadow: 0 0 0 3px rgba(232,89,12,.15);
    }
    .inp-wrap .eye-btn {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255,255,255,.35);
      cursor: pointer; font-size: 16px; padding: 4px; line-height: 1;
      transition: color .2s;
    }
    .inp-wrap .eye-btn:hover { color: rgba(255,255,255,.7); }

    /* Erro */
    .err-box {
      background: rgba(220,38,38,.14);
      border: 1px solid rgba(220,38,38,.28);
      color: #fca5a5;
      border-radius: 12px; padding: 10px 14px;
      font-size: 13px; font-weight: 700; text-align: center;
      margin-bottom: 12px; display: none;
    }
    .err-box.show { display: block; }

    /* Botão principal */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand2) 100%);
      color: #fff; border: none; padding: 15px 20px;
      border-radius: 14px; font-family: inherit;
      font-size: 16px; font-weight: 900; cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 6px 22px rgba(232,89,12,.38);
      display: flex; align-items: center; justify-content: center; gap: 9px;
      letter-spacing: .3px;
    }
    .btn-primary:hover   { opacity: .92; transform: translateY(-2px); box-shadow: 0 10px 28px rgba(232,89,12,.46); }
    .btn-primary:active  { transform: scale(.97); box-shadow: 0 4px 14px rgba(232,89,12,.3); }
    .btn-primary:disabled{ opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ══════════════════════════
       TELA PRIMEIRO ACESSO
    ══════════════════════════ */
    #screen-first-access {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 48px;
      animation: fadeUp .45s ease both;
    }
    .first-card {
      width: 100%;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(234,179,8,.25);
      border-radius: 28px;
      padding: 34px 28px 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.07);
    }
    .first-card .fc-icon { font-size: 48px; text-align: center; display: block; margin-bottom: 10px; }
    .first-card h2 { font-size: 21px; font-weight: 900; text-align: center; margin-bottom: 6px; }
    .first-card p  { font-size: 13px; color: rgba(255,255,255,.42); text-align: center; margin-bottom: 24px; line-height: 1.5; }

    /* ══════════════════════════
       HUB DE SISTEMAS
    ══════════════════════════ */
    #screen-hub {
      width: 100%; max-width: 540px;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 40px;
      animation: fadeUp .45s ease both;
    }

    /* Cabeçalho do hub */
    .hub-top {
      text-align: center; margin-bottom: 32px; width: 100%;
      display: flex; flex-direction: column; align-items: center;
    }
    .hub-logo {
      height: 90px; width: auto; object-fit: contain;
      margin-bottom: 18px;
      filter: drop-shadow(0 4px 18px rgba(232,89,12,.35));
    }
    .hub-greeting { font-size: 14px; color: rgba(255,255,255,.42); margin-bottom: 3px; }
    .hub-name {
      font-size: 26px; font-weight: 900;
      background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,.55));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .role-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 16px; border-radius: 30px;
      font-size: 12px; font-weight: 800; letter-spacing: .3px;
    }
    .role-admin    { background: rgba(234,179,8,.18);  color: #fde068; border: 1px solid rgba(234,179,8,.28); }
    .role-lider    { background: rgba(59,130,246,.18);  color: #93c5fd; border: 1px solid rgba(59,130,246,.28); }
    .role-colab    { background: rgba(34,197,94,.18);   color: #86efac; border: 1px solid rgba(34,197,94,.28); }
    .role-uploader { background: rgba(99,102,241,.18);  color: #a5b4fc; border: 1px solid rgba(99,102,241,.28); }

    /* Grid de sistemas */
    .sys-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px; width: 100%;
    }
    @media(max-width:380px) { .sys-grid { grid-template-columns: 1fr; } }

    .sys-card {
      background: var(--glass);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 22px; padding: 24px 16px 20px;
      cursor: pointer; transition: all .25s;
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; font-family: inherit; text-decoration: none;
      position: relative; overflow: hidden;
    }
    .sys-card::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.04), transparent);
      opacity: 0; transition: opacity .25s;
    }
    .sys-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,.22); }
    .sys-card:hover::after { opacity: 1; }
    .sys-card:active { transform: scale(.97); }

    /* Estados */
    .sys-card.locked {
      opacity: .3; cursor: not-allowed; filter: grayscale(.6);
    }
    .sys-card.locked:hover { transform: none; border-color: rgba(255,255,255,.1); }
    .sys-card.coming-soon {
      opacity: .5; cursor: default;
    }
    .sys-card.coming-soon:hover { transform: none; }

    /* Cores de borda por sistema */
    .sys-producao  { border-color: rgba(232,89,12,.35);  box-shadow: 0 4px 22px rgba(232,89,12,.14); }
    .sys-motoboys  { border-color: rgba(234,179,8,.35);  box-shadow: 0 4px 22px rgba(234,179,8,.11); }
    .sys-dashboard { border-color: rgba(139,92,246,.35); box-shadow: 0 4px 22px rgba(139,92,246,.11); }
    .sys-financeiro{ border-color: rgba(34,197,94,.35);  box-shadow: 0 4px 22px rgba(34,197,94,.11); }
    .sys-uploads   { border-color: rgba(99,102,241,.35); box-shadow: 0 4px 22px rgba(99,102,241,.11); }

    .sys-producao:not(.locked):not(.coming-soon):hover  { border-color: rgba(232,89,12,.75);  box-shadow: 0 10px 34px rgba(232,89,12,.3); }
    .sys-motoboys:not(.locked):not(.coming-soon):hover  { border-color: rgba(234,179,8,.75);  box-shadow: 0 10px 34px rgba(234,179,8,.25); }
    .sys-dashboard:not(.locked):not(.coming-soon):hover { border-color: rgba(139,92,246,.75); box-shadow: 0 10px 34px rgba(139,92,246,.24); }
    .sys-financeiro:not(.locked):not(.coming-soon):hover{ border-color: rgba(34,197,94,.75);  box-shadow: 0 10px 34px rgba(34,197,94,.24); }
    .sys-uploads:not(.locked):not(.coming-soon):hover   { border-color: rgba(99,102,241,.75); box-shadow: 0 10px 34px rgba(99,102,241,.28); }

    .sys-icon { font-size: 42px; line-height: 1; filter: drop-shadow(0 2px 10px rgba(0,0,0,.35)); }
    .sys-name { font-size: 15px; font-weight: 900; color: #fff; text-align: center; line-height: 1.3; }
    .sys-sub  { font-size: 11px; color: rgba(255,255,255,.4); text-align: center; line-height: 1.4; }

    .sys-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 9px; font-weight: 900;
      padding: 3px 9px; border-radius: 20px; letter-spacing: .5px;
    }
    .badge-active { background: var(--brand); color: #fff; }
    .badge-soon   { background: rgba(255,255,255,.1); color: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.12); }
    .badge-lock   { background: rgba(0,0,0,.25); color: rgba(255,255,255,.35); }
    .badge-new    { background: rgba(99,102,241,.85); color: #fff; }

    /* Divider e footer */
    .hub-divider {
      width: 100%; border: none;
      border-top: 1px solid rgba(255,255,255,.07);
      margin: 28px 0 20px;
    }
    .hub-footer {
      display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(255,255,255,.13);
      color: rgba(255,255,255,.4); padding: 11px 28px;
      border-radius: 30px; font-family: inherit; font-size: 13px;
      font-weight: 700; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-logout:hover { border-color: rgba(255,255,255,.3); color: rgba(255,255,255,.75); }
    .btn-config-link {
      background: none; border: none; cursor: pointer; font-family: inherit;
      color: rgba(255,255,255,.22); font-size: 11px; font-weight: 700;
      display: flex; align-items: center; gap: 5px; transition: color .2s;
      padding: 4px 8px;
    }
    .btn-config-link:hover { color: rgba(255,255,255,.55); }

    /* ══ TOAST ══ */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(15,15,26,.96); color: #fff;
      border: 1px solid rgba(255,255,255,.1);
      padding: 12px 24px; border-radius: 30px;
      font-size: 14px; font-weight: 700;
      opacity: 0; transition: all .3s; z-index: 9999;
      pointer-events: none; white-space: nowrap; max-width: 92vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══ SPINNER ══ */
    .spin { display: inline-block; animation: _spin 1s linear infinite; }
    @keyframes _spin { to { transform: rotate(360deg); } }

    /* ══ ANIMAÇÕES ══ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══ VERSÃO / INFO ══ */
    .portal-version {
      position: fixed; bottom: 10px; right: 14px;
      font-size: 10px; color: rgba(255,255,255,.13);
      font-weight: 700; z-index: 1; pointer-events: none;
    }
  </style>
</head>
<body>

<!-- Fundo animado -->
<div class="bg-canvas"></div>
<div class="bg-dots"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Info de versão -->
<div class="portal-version">JB v3.0</div>

<div class="portal-scroll">

  <!-- ══════════════════════════════════════════
       TELA 1 — LOGIN
  ══════════════════════════════════════════ -->
  <div id="screen-login">

    <!-- Logo centralizado -->
    <div class="logo-block">
      <img src="images/logo-justburger.png" alt="Just Burger"
           class="logo-img" id="portal-logo"
           onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex'"/>
      <div id="logo-fallback" class="logo-fallback">
        <span class="lf-emoji">🍔</span>
        <span class="lf-name">JUST BURGER</span>
        <span class="lf-sub">Hamburgueria</span>
      </div>
      <div class="logo-tagline">Sistema de Gestão</div>
    </div>

    <!-- Card de login -->
    <div class="login-card">
      <h2>Bem-vindo(a)! 👋</h2>
      <p>Entre com seu usuário e senha para<br>acessar os sistemas</p>

      <!-- Usuário -->
      <div class="inp-wrap">
        <i class="fas fa-user iw-icon"></i>
        <input type="text" id="login-user" placeholder="Usuário"
               autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false"
               onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()"/>
      </div>

      <!-- Senha -->
      <div class="inp-wrap">
        <i class="fas fa-lock iw-icon"></i>
        <input type="password" id="login-pass" placeholder="Senha"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter')_portalLogin()"/>
        <button class="eye-btn" onclick="_togglePass('login-pass',this)" tabindex="-1">
          <i class="fas fa-eye"></i>
        </button>
      </div>

      <!-- Erro -->
      <div class="err-box" id="login-err"></div>

      <!-- Botão entrar -->
      <button class="btn-primary" id="btn-login" onclick="_portalLogin()">
        <i class="fas fa-sign-in-alt"></i> Entrar
      </button>
    </div>

  </div><!-- /screen-login -->

  <!-- ══════════════════════════════════════════
       TELA 2 — PRIMEIRO ACESSO (criar senha)
  ══════════════════════════════════════════ -->
  <div id="screen-first-access" class="hidden">
    <div class="logo-block" style="margin-bottom:24px">
      <img src="images/logo-justburger.png" alt="Just Burger"
           class="logo-img" style="height:85px"
           onerror="this.style.display='none'"/>
    </div>
    <div class="first-card">
      <span class="fc-icon">🔑</span>
      <h2>Crie sua senha</h2>
      <p>Primeiro acesso detectado.<br>Escolha uma senha pessoal para continuar.</p>

      <div class="inp-wrap">
        <i class="fas fa-lock iw-icon"></i>
        <input type="password" id="fa-nova" placeholder="Nova senha (mín. 4 caracteres)"
               autocomplete="new-password"
               onkeydown="if(event.key==='Enter')document.getElementById('fa-confirma').focus()"/>
        <button class="eye-btn" onclick="_togglePass('fa-nova',this)" tabindex="-1">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <div class="inp-wrap">
        <i class="fas fa-lock iw-icon"></i>
        <input type="password" id="fa-confirma" placeholder="Confirme a senha"
               autocomplete="new-password"
               onkeydown="if(event.key==='Enter')_salvarPrimeiraSenha()"/>
        <button class="eye-btn" onclick="_togglePass('fa-confirma',this)" tabindex="-1">
          <i class="fas fa-eye"></i>
        </button>
      </div>

      <div class="err-box" id="fa-err"></div>

      <button class="btn-primary" onclick="_salvarPrimeiraSenha()">
        <i class="fas fa-check"></i> Confirmar e Entrar
      </button>
    </div>
  </div><!-- /screen-first-access -->

  <!-- ══════════════════════════════════════════
       TELA 3 — HUB DE SISTEMAS
  ══════════════════════════════════════════ -->
  <div id="screen-hub" class="hidden">

    <!-- Topo: logo + saudação + papel -->
    <div class="hub-top">
      <img src="images/logo-justburger.png" alt="Just Burger" class="hub-logo"
           onerror="this.style.display='none'"/>
      <div class="hub-greeting">Olá,</div>
      <div class="hub-name" id="hub-nome">—</div>
      <span class="role-pill" id="hub-role-pill">—</span>
    </div>

    <!-- Grid dos sistemas -->
    <div class="sys-grid" id="sys-grid">
      <!-- Preenchido dinamicamente -->
    </div>

    <hr class="hub-divider"/>

    <!-- Rodapé: logout + configurações -->
    <div class="hub-footer">
      <button class="btn-logout" onclick="_portalLogout()">
        <i class="fas fa-sign-out-alt"></i> Sair
      </button>
      <button class="btn-config-link" id="btn-config-link" style="display:none"
              onclick="window.location.href='config.html'">
        <i class="fas fa-cog"></i> Configurações do sistema
      </button>
    </div>

  </div><!-- /screen-hub -->

</div><!-- /portal-scroll -->

<script>
'use strict';

/* ══════════════════════════════════════════════════
   JUST BURGER — PORTAL v3
   Hub central de sistemas com login e controle de acesso
══════════════════════════════════════════════════ */

/* ── Restaura sessão passada pelo Hub via query param _jbs ── */
(function _restoreHubSession() {
  try {
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('_jbs');
    if (!token) return;
    const json = decodeURIComponent(escape(atob(decodeURIComponent(token))));
    const sess = JSON.parse(json);
    if (sess && sess.username) {
      sessionStorage.setItem('jb_user', JSON.stringify(sess));
    }
    /* Limpa o token da URL sem recarregar */
    params.delete('_jbs');
    params.delete('_cb');
    const novaUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
    history.replaceState(null, '', novaUrl);
  } catch(e) { /* silencioso */ }
})();

/* ── Credenciais admin de emergência (sem Firebase) ── */
const _ADMFB = { u: 'justadm', h: btoa('lider12345*') };

/* ── Estado em memória ── */
let _usr = null;

/* ══ DEFINIÇÃO DOS SISTEMAS ══════════════════════

/* ══ UTILITÁRIOS ══ */
const _hash   = s => btoa(unescape(encodeURIComponent(s)));
const _unhash = s => { try { return decodeURIComponent(escape(atob(s))); } catch(e) { return s; } };

function _togglePass(id, btn) {
  const inp = document.getElementById(id);
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  btn.querySelector('i').className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
}

let _toastTimer;
function _toast(msg, dur = 3200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

function _showScreen(id) {
  ['screen-login','screen-first-access','screen-hub']
    .forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ══ LOGIN ══ */
async function _portalLogin() {
  const u   = (document.getElementById('login-user').value || '').trim().toLowerCase();
  const p   = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('btn-login');

  err.classList.remove('show');

  if (!u || !p) {
    err.textContent = '⚠️ Preencha usuário e senha';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⏳</span> Verificando...';

  try {
    /* 1. Fallback admin local */
    if (u === _ADMFB.u && _hash(p) === _ADMFB.h) {
      _usr = {
        username: 'justadm', nome_display: 'Administrador',
        papel: 'admin', nome_card: '', departamento: 'TODOS',
        primeiro_acesso: false, ativo: true,
        sistemas: [],  // admin vê tudo
      };
      _entrarHub();
      return;
    }

    /* 2. Busca no Firebase */
    const lista = await fbv2_getAll('usuarios');
    const found = lista.find(x => x.username === u);

    if (!found) {
      return _errLogin(err, btn, '❌ Usuário não encontrado');
    }
    if (found.ativo === false) {
      return _errLogin(err, btn, '🚫 Usuário desativado. Contate o administrador.');
    }
    if (_unhash(found.senha || '') !== p) {
      return _errLogin(err, btn, '❌ Senha incorreta');
    }

    _usr = found;

    /* Primeiro acesso → trocar senha */
    if (found.primeiro_acesso === true) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
      _showScreen('screen-first-access');
      return;
    }

    _entrarHub();

  } catch(e) {
    _errLogin(err, btn, '❌ Erro de conexão. Tente novamente.');
    console.error(e);
  }
}

function _errLogin(errEl, btn, msg) {
  errEl.textContent = msg;
  errEl.classList.add('show');
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
}

/* ══ PRIMEIRO ACESSO ══ */
async function _salvarPrimeiraSenha() {
  const nova  = document.getElementById('fa-nova').value;
  const conf  = document.getElementById('fa-confirma').value;
  const err   = document.getElementById('fa-err');

  err.classList.remove('show');

  if (!nova || nova.length < 4) {
    err.textContent = '⚠️ Senha deve ter pelo menos 4 caracteres';
    err.classList.add('show'); return;
  }
  if (nova !== conf) {
    err.textContent = '⚠️ As senhas não coincidem';
    err.classList.add('show'); return;
  }

  try {
    await fbv2_patch('usuarios', _usr.id, {
      senha: _hash(nova),
      primeiro_acesso: false,
    });
    _usr.primeiro_acesso = false;
    _usr.senha = _hash(nova);
    _toast('✅ Senha criada! Bem-vindo(a)!');
    _entrarHub();
  } catch(e) {
    err.textContent = '❌ Erro ao salvar. Tente novamente.';
    err.classList.add('show');
  }
}

/* ══ ENTRAR NO HUB ══ */
function _entrarHub() {
  const papel     = _usr.papel || 'colaborador';
  const sistemasU = Array.isArray(_usr.sistemas) ? _usr.sistemas : [];

  /* Persiste sessão completa */
  sessionStorage.setItem('jb_user', JSON.stringify({
    username:        _usr.username,
    nome:            _usr.nome_display,
    papel:           papel,
    nome_card:       _usr.nome_card       || '',
    departamento:    _usr.departamento    || 'TODOS',
    sistemas:        sistemasU,
    turno_preferido: _usr.turno_preferido || '',
  }));

  /* ─────────────────────────────────────────────
     REDIRECIONAMENTO AUTOMÁTICO
     - Colaborador com 1 único sistema ativo → vai direto
     - Uploader → vai direto para uploads.html
  ───────────────────────────────────────────── */
  if (papel === 'uploader') {
    _abrirSistema('uploads.html', 'uploads');
    return;
  }
  if (papel === 'colaborador' && sistemasU.length === 1) {
    const sis = SISTEMAS.find(s => s.id === sistemasU[0]);
    if (sis && sis.status === 'active') {
      _abrirSistema(sis.url, sis.id);
      return;
    }
  }

  /* ─────────────────────────────────────────────
     MOSTRAR HUB
  ───────────────────────────────────────────── */
  document.getElementById('hub-nome').textContent =
    _usr.nome_display || _usr.username;

  const PAPEIS = {
    admin:       { label: '👑 Administrador',  cls: 'role-admin' },
    lider:       { label: '🎖️ Líder',          cls: 'role-lider' },
    colaborador: { label: '👷 Colaborador',    cls: 'role-colab' },
    uploader:    { label: '📂 Uploader',       cls: 'role-uploader' },
  };
  const rp = PAPEIS[papel] || { label: papel, cls: 'role-colab' };
  const pill = document.getElementById('hub-role-pill');
  pill.textContent = rp.label;
  pill.className   = 'role-pill ' + rp.cls;

  /* Botão configurações (admin/lider) */
  const cfgBtn = document.getElementById('btn-config-link');
  cfgBtn.style.display = ['admin','lider'].includes(papel) ? 'flex' : 'none';

  /* Renderiza sistemas */
  _renderSistemas();

  _showScreen('screen-hub');
}

/* ══ RENDERIZAR GRADE DE SISTEMAS ══ */
function _renderSistemas() {
  const papel     = _usr.papel || 'colaborador';
  const sistemasU = Array.isArray(_usr.sistemas) ? _usr.sistemas : [];
  const grid      = document.getElementById('sys-grid');

  grid.innerHTML = SISTEMAS.map(s => {
    /*
      Regras de visibilidade:
      - admin: vê TODOS os sistemas sem restrição
      - lider com sistemas[] vazio: vê tudo que o papel permite (acesso por papel)
      - lider com sistemas[] preenchido: vê só os listados
      - colaborador: vê só os que estão em sistemasU
    */
    let temAcesso;
    if (papel === 'admin') {
      temAcesso = true;
    } else if (papel === 'uploader') {
      /* Uploader vê apenas o módulo de uploads */
      temAcesso = s.id === 'uploads';
    } else if (papel === 'lider') {
      if (sistemasU.length === 0) {
        temAcesso = s.acesso === 'todos' || (Array.isArray(s.acesso) && s.acesso.includes('lider'));
      } else {
        temAcesso = sistemasU.includes(s.id);
      }
    } else {
      temAcesso = sistemasU.includes(s.id);
    }

    if (!temAcesso) return '';

    const isSoon     = s.status === 'soon';
    const extraClass = isSoon ? 'coming-soon' : '';

    const badgeHtml = s.badge
      ? `<span class="sys-badge ${s.badge.cls}">${s.badge.label}</span>`
      : '';

    const onclickAttr = isSoon
      ? `onclick="_sistemaSoon('${s.nome}')"`
      : `onclick="_abrirSistema('${s.url}','${s.id}')"`;

    return `
      <div class="sys-card ${s.cor} ${extraClass}" ${onclickAttr}>
        ${badgeHtml}
        <div class="sys-icon">${s.icon}</div>
        <div class="sys-name">${s.nome}</div>
        <div class="sys-sub">${s.sub}</div>
      </div>`;
  }).join('');
}

function _abrirSistema(url, id) {
  /* Atualiza sessão com sistema ativo */
  try {
    const sess = JSON.parse(sessionStorage.getItem('jb_user') || '{}');
    sess.sistema_ativo = id;
    sessionStorage.setItem('jb_user', JSON.stringify(sess));
  } catch(e) {}
  /* Links externos abrem em nova aba; internos na mesma aba com cache-buster */
  if (url.startsWith('http://') || url.startsWith('https://')) {
    window.open(url, '_blank', 'noopener');
  } else {
    /* Adiciona ?_cb=timestamp para forçar o browser a não usar cache */
    const sep = url.includes('?') ? '&' : '?';
    window.location.href = url + sep + '_cb=' + Date.now();
  }
}

function _sistemaLocked(nome) {
  _toast(`🔒 Você não tem acesso a "${nome}"`);
}
function _sistemaSoon(nome) {
  _toast(`🚧 ${nome} — Em breve!`);
}

/* ══ LOGOUT ══ */
function _portalLogout() {
  _usr = null;
  sessionStorage.removeItem('jb_user');
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-err').classList.remove('show');
  _showScreen('screen-login');
  setTimeout(() => document.getElementById('login-user').focus(), 250);
  _toast('👋 Até logo!');
}

/* ══ INICIALIZAÇÃO ══ */
document.addEventListener('DOMContentLoaded', () => {
  /* Verifica se há sessão ativa */
  const raw = sessionStorage.getItem('jb_user');
  if (raw) {
    try {
      const saved = JSON.parse(raw);
      _usr = {
        username:        saved.username,
        nome_display:    saved.nome,
        papel:           saved.papel,
        nome_card:       saved.nome_card        || '',
        departamento:    saved.departamento     || 'TODOS',
        sistemas:        saved.sistemas         || [],
        turno_preferido: saved.turno_preferido  || '',
        primeiro_acesso: false,
        ativo: true,
      };
      _entrarHub();
      return;
    } catch(e) {
      sessionStorage.removeItem('jb_user');
    }
  }

  /* Foco automático no campo de usuário */
  setTimeout(() => {
    const inp = document.getElementById('login-user');
    if (inp) inp.focus();
  }, 250);
});
</script>

<!-- Service Worker: força atualização automática a cada deploy -->
<script>
if ('serviceWorker' in navigator) {
  const swUrl = new URL('sw.js', window.location.href).href;
  navigator.serviceWorker.register(swUrl)
    .then(reg => {
      reg.update();
      console.log('[SW] Registrado no portal:', reg.scope);
    })
    .catch(err => console.warn('[SW] Falha:', err));

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}
</script>
